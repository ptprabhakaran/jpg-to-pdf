<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JPG to PDF</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --text: #1a1a18;
    --muted: #888880;
    --border: #e2dfd8;
    --accent: #1a1a18;
    --green: #2d6a4f;
    --green-light: #e8f4ef;
    --radius: 2px;
    --mono: 'DM Mono', monospace;
    --serif: 'Instrument Serif', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4rem 1.5rem 6rem;
  }

  header {
    width: 100%;
    max-width: 560px;
    margin-bottom: 3.5rem;
    animation: fadeUp 0.5s ease both;
  }

  .logo-line {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 6px;
  }

  h1 {
    font-family: var(--serif);
    font-size: 42px;
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
  }

  .arrow {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--muted);
    font-weight: 300;
  }

  .tagline {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 300;
  }

  .main {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Drop zone */
  .drop-zone {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 3.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    animation: fadeUp 0.5s 0.1s ease both;
    position: relative;
    overflow: hidden;
  }

  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 8px,
      rgba(0,0,0,0.012) 8px,
      rgba(0,0,0,0.012) 9px
    );
    pointer-events: none;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    background: #fefefe;
    border-color: var(--text);
  }

  .drop-icon {
    width: 36px;
    height: 36px;
    margin: 0 auto 16px;
    opacity: 0.25;
  }

  .drop-main {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 4px;
    font-weight: 400;
  }

  .drop-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  #file-input { display: none; }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
  }

  /* Preview */
  .preview-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    padding: 1.25rem;
    display: none;
    animation: fadeUp 0.3s ease both;
  }

  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .preview-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
  }

  .clear-btn {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--mono);
    padding: 0;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: var(--text); }

  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
    gap: 8px;
  }

  .preview-card {
    position: relative;
    border: 1px solid var(--border);
    overflow: hidden;
    background: var(--bg);
  }

  .preview-card img {
    width: 100%;
    height: 72px;
    object-fit: cover;
    display: block;
    filter: grayscale(15%);
    transition: filter 0.2s;
  }
  .preview-card:hover img { filter: grayscale(0%); }

  .preview-card .fname {
    font-size: 9px;
    color: var(--muted);
    padding: 4px 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.03em;
  }

  .remove-btn {
    position: absolute;
    top: 4px; right: 4px;
    background: rgba(26,26,24,0.7);
    border: none;
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: #fff;
    font-size: 10px;
    transition: background 0.15s;
    font-family: var(--mono);
  }
  .remove-btn:hover { background: rgba(26,26,24,0.95); }

  /* Options */
  .options-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    padding: 1.25rem;
    display: none;
  }

  .options-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .opt-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .opt-label {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
  }

  select {
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    appearance: none;
    cursor: pointer;
    border-radius: var(--radius);
    transition: border-color 0.15s;
    outline: none;
  }
  select:hover, select:focus { border-color: var(--text); }

  /* Actions */
  .actions-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    padding: 1.25rem;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeUp 0.5s 0.2s ease both;
  }

  .convert-btn {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 10px 24px;
    background: var(--text);
    color: var(--bg);
    border: 1px solid var(--text);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-radius: var(--radius);
    font-weight: 400;
  }
  .convert-btn:hover:not(:disabled) { background: #333; }
  .convert-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .download-btn {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 10px 24px;
    background: var(--green-light);
    color: var(--green);
    border: 1px solid #a8d5be;
    cursor: pointer;
    border-radius: var(--radius);
    display: none;
    transition: background 0.15s;
    font-weight: 400;
  }
  .download-btn:hover { background: #d5ede4; }

  .status-text {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
    flex: 1;
  }

  /* Progress */
  .progress-wrap {
    height: 2px;
    background: var(--border);
    display: none;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--text);
    width: 0%;
    transition: width 0.25s ease;
  }

  /* Count pill */
  .count-pill {
    display: none;
    font-size: 10px;
    background: var(--bg);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 2px 8px;
    letter-spacing: 0.06em;
    font-family: var(--mono);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  footer {
    margin-top: 4rem;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    animation: fadeUp 0.5s 0.4s ease both;
    opacity: 0;
    animation-fill-mode: both;
  }
</style>
</head>
<body>

<header>
  <div class="logo-line">
    <h1>jpg</h1>
    <span class="arrow">→</span>
    <h1>pdf</h1>
  </div>
  <p class="tagline">Local converter · No upload · No server</p>
</header>

<div class="main">

  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <rect x="3" y="3" width="18" height="18" rx="1"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <p class="drop-main">Drop images here or click to browse</p>
    <p class="drop-sub">.jpg &nbsp;·&nbsp; .jpeg &nbsp;·&nbsp; multiple files supported</p>
  </div>
  <input type="file" id="file-input" accept=".jpg,.jpeg,image/jpeg" multiple />

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div class="preview-section" id="preview-section">
    <div class="preview-header">
      <span class="preview-label">Images <span class="count-pill" id="count-pill"></span></span>
      <button class="clear-btn" id="clear-btn">Clear all</button>
    </div>
    <div class="preview-grid" id="preview-grid"></div>
  </div>

  <div class="options-section" id="options-section">
    <div class="options-grid">
      <div class="opt-group">
        <span class="opt-label">Page size</span>
        <select id="page-size">
          <option value="a4">A4</option>
          <option value="letter">Letter</option>
          <option value="fit">Fit image</option>
        </select>
      </div>
      <div class="opt-group">
        <span class="opt-label">Orientation</span>
        <select id="orientation">
          <option value="auto">Auto</option>
          <option value="portrait">Portrait</option>
          <option value="landscape">Landscape</option>
        </select>
      </div>
      <div class="opt-group">
        <span class="opt-label">Margin</span>
        <select id="margin">
          <option value="0">None</option>
          <option value="20" selected>Small</option>
          <option value="40">Medium</option>
        </select>
      </div>
    </div>
  </div>

  <div class="actions-section">
    <button class="convert-btn" id="convert-btn" disabled>Convert</button>
    <button class="download-btn" id="download-btn">Download PDF</button>
    <span class="status-text" id="status"></span>
  </div>

</div>

<footer>All processing happens in your browser</footer>

<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const previewGrid = document.getElementById('preview-grid');
const previewSection = document.getElementById('preview-section');
const optionsSection = document.getElementById('options-section');
const convertBtn = document.getElementById('convert-btn');
const downloadBtn = document.getElementById('download-btn');
const statusEl = document.getElementById('status');
const progressWrap = document.getElementById('progress-wrap');
const progressBar = document.getElementById('progress-bar');
const countPill = document.getElementById('count-pill');
const clearBtn = document.getElementById('clear-btn');

let files = [];
let pdfBlob = null;

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles([...e.dataTransfer.files]); });
fileInput.addEventListener('change', () => { handleFiles([...fileInput.files]); fileInput.value = ''; });
clearBtn.addEventListener('click', () => { files = []; renderPreviews(); updateUI(); });

function handleFiles(newFiles) {
  const jpgs = newFiles.filter(f => f.type === 'image/jpeg' || f.name.toLowerCase().endsWith('.jpg') || f.name.toLowerCase().endsWith('.jpeg'));
  if (jpgs.length !== newFiles.length) statusEl.textContent = 'Some files skipped — JPG only.';
  files = [...files, ...jpgs];
  renderPreviews();
  updateUI();
}

function renderPreviews() {
  previewGrid.innerHTML = '';
  files.forEach((f, i) => {
    const url = URL.createObjectURL(f);
    const card = document.createElement('div');
    card.className = 'preview-card';
    card.innerHTML = `<img src="${url}" alt="${f.name}"><div class="fname">${f.name}</div><button class="remove-btn" data-i="${i}">✕</button>`;
    previewGrid.appendChild(card);
  });
  previewGrid.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      files.splice(parseInt(btn.dataset.i), 1);
      renderPreviews(); updateUI();
    });
  });
}

function updateUI() {
  const has = files.length > 0;
  convertBtn.disabled = !has;
  previewSection.style.display = has ? 'block' : 'none';
  optionsSection.style.display = has ? 'block' : 'none';
  countPill.style.display = has ? 'inline' : 'none';
  countPill.textContent = files.length;
  downloadBtn.style.display = 'none';
  pdfBlob = null;
  if (!has) { statusEl.textContent = ''; progressWrap.style.display = 'none'; }
}

convertBtn.addEventListener('click', async () => {
  if (!files.length) return;
  convertBtn.disabled = true;
  downloadBtn.style.display = 'none';
  statusEl.textContent = 'Processing…';
  progressWrap.style.display = 'block';
  progressBar.style.width = '0%';

  try {
    const { jsPDF } = window.jspdf;
    const pageSize = document.getElementById('page-size').value;
    const orientation = document.getElementById('orientation').value;
    const margin = parseInt(document.getElementById('margin').value);
    const PAGE_SIZES = { a4: [595.28, 841.89], letter: [612, 792] };
    let pdf = null;

    for (let i = 0; i < files.length; i++) {
      progressBar.style.width = Math.round((i / files.length) * 90) + '%';
      statusEl.textContent = `${i + 1} / ${files.length}`;
      const imgData = await readFile(files[i]);
      const dims = await getImgDims(imgData);
      const imgW = dims.width, imgH = dims.height;

      let pw, ph, orient;
      if (pageSize === 'fit') {
        pw = imgW; ph = imgH; orient = imgH >= imgW ? 'p' : 'l';
      } else {
        const base = PAGE_SIZES[pageSize];
        const isLandscape = orientation === 'landscape' || (orientation === 'auto' && imgW > imgH);
        orient = isLandscape ? 'l' : 'p';
        pw = isLandscape ? base[1] : base[0];
        ph = isLandscape ? base[0] : base[1];
      }

      if (!pdf) {
        pdf = new jsPDF({ orientation: orient === 'l' ? 'landscape' : 'portrait', unit: 'pt', format: pageSize === 'fit' ? [pw, ph] : pageSize });
      } else {
        pdf.addPage(pageSize === 'fit' ? [pw, ph] : pageSize, orient === 'l' ? 'landscape' : 'portrait');
      }

      const usableW = pw - margin * 2, usableH = ph - margin * 2;
      const scale = Math.min(usableW / imgW, usableH / imgH);
      const drawW = imgW * scale, drawH = imgH * scale;
      const x = margin + (usableW - drawW) / 2, y = margin + (usableH - drawH) / 2;
      pdf.addImage(imgData, 'JPEG', x, y, drawW, drawH);
    }

    progressBar.style.width = '100%';
    statusEl.textContent = 'Ready to download';
    pdfBlob = pdf.output('blob');
    downloadBtn.style.display = 'inline-block';
    convertBtn.disabled = false;
  } catch (err) {
    statusEl.textContent = 'Error: ' + err.message;
    convertBtn.disabled = false;
  }
});

downloadBtn.addEventListener('click', () => {
  if (!pdfBlob) return;
  const url = URL.createObjectURL(pdfBlob);
  const a = document.createElement('a');
  a.href = url; a.download = 'converted.pdf';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

function readFile(file) {
  return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
}
function getImgDims(dataURL) {
  return new Promise(res => { const img = new Image(); img.onload = () => res({ width: img.naturalWidth, height: img.naturalHeight }); img.src = dataURL; });
}
</script>
</body>
</html>
